name: Web2APK Remote Build
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Throwaway branch containing build-payload.zip'
        required: true
      build_type:
        description: 'Gradle task to run'
        required: false
        default: 'assembleDebug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout payload branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip project payload
        run: |
          mkdir -p project
          unzip -oq build-payload.zip -d project
          rm -f build-payload.zip

      - name: Grant execute permission for gradlew
        run: chmod +x project/gradlew

      - name: Build APK
        working-directory: project
        run: ./gradlew ${{ github.event.inputs.build_type }} --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: project/**/build/outputs/apk/**/*.apk
          retention-days: 1
